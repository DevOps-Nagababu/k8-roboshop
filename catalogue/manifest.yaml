apiVersion: v1
kind: ConfigMap
metadata:
  name: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
  
spec:
  replicas: 2

  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue

    spec:
      containers:
      - name: catalogue
        image: joindevops/catalogue:1.0.0
        envFrom:
        - configMapRef:
            name: configmap-demo

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 15
          periodSeconds: 10

        envFrom:
        - configMapRef:
            name: catalogue