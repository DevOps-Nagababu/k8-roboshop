apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: catalogue

spec:
  replicas: 2

  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: catalogue

  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: catalogue

    spec:
      containers:
      - name: catalogue
        image: joindevops/mongodb:1.0.0

---

apiVersion: v1
kind: Service

metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: catalogue

spec:
  selector:
    project: roboshop
    tier: db
    component: catalogue

  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017